services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bts-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bts-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
