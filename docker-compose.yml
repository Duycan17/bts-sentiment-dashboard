services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bts-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./artifacts/chroma:/app/artifacts/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bts-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
